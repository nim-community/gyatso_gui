name: CI

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup Nim
      uses: jiro4989/setup-nim-action@v1
      with:
        nim-version: '2.2.0'

    - name: Install dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev libglfw3-dev libasound2-dev

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install glfw

    - name: Build Debug
      run: nimble build -Y

    - name: Test
      run: nimble test -Y

  release-linux:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - uses: actions/checkout@v4

    - name: Setup Nim
      uses: jiro4989/setup-nim-action@v1
      with:
        nim-version: '2.2.0'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev libglfw3-dev libasound2-dev

    - name: Build Release
      run: nimble build -Y -d:release

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      with:
        files: gyatso_gui
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-macos:
    needs: build
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - uses: actions/checkout@v4

    - name: Setup Nim
      uses: jiro4989/setup-nim-action@v1
      with:
        nim-version: '2.2.0'

    - name: Install dependencies
      run: |
        brew install glfw

    - name: Build Release
      run: nimble build -Y -d:release

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      with:
        files: gyatso_gui
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-windows:
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - uses: actions/checkout@v4

    - name: Setup Nim
      uses: jiro4989/setup-nim-action@v1
      with:
        nim-version: '2.2.0'

    - name: Build Release
      run: nimble build -Y -d:release

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      with:
        files: gyatso_gui.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

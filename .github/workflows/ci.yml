name: CI

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Cache nimble
      uses: actions/cache@v4
      with:
        path: ~/.nimble
        key: ${{ runner.os }}-nimble-v2-${{ hashFiles('*.nimble') }}
        restore-keys: |
          ${{ runner.os }}-nimble-v2-
      if: runner.os != 'Windows'

    - name: Setup Nim
      uses: jiro4989/setup-nim-action@v2
      with:
        nim-version: '2.2.x'
        repo-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev libglfw3-dev libasound2-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libxxf86vm-dev

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install glfw

    - name: Build
      run: nimble build -Y

    - name: Test
      run: nimble test -Y

  release-linux:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Cache nimble
      uses: actions/cache@v4
      with:
        path: ~/.nimble
        key: ${{ runner.os }}-nimble-v2-${{ hashFiles('*.nimble') }}
        restore-keys: |
          ${{ runner.os }}-nimble-v2-

    - name: Setup Nim
      uses: jiro4989/setup-nim-action@v2
      with:
        nim-version: '2.2.x'
        repo-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev libglfw3-dev libasound2-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libxxf86vm-dev

    - name: Build Release
      run: nimble build -Y -d:release

    - name: Rename binary
      run: mv gyatso_gui gyatso_gui-linux-x86_64

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      with:
        files: gyatso_gui-linux-x86_64
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-macos:
    needs: build
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Cache nimble
      uses: actions/cache@v4
      with:
        path: ~/.nimble
        key: ${{ runner.os }}-nimble-v2-${{ hashFiles('*.nimble') }}
        restore-keys: |
          ${{ runner.os }}-nimble-v2-

    - name: Setup Nim
      uses: jiro4989/setup-nim-action@v2
      with:
        nim-version: '2.2.x'
        repo-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install dependencies
      run: |
        brew install glfw

    - name: Build Release
      run: nimble build -Y -d:release

    - name: Rename binary
      run: mv gyatso_gui gyatso_gui-macos-arm64

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      with:
        files: gyatso_gui-macos-arm64
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-windows:
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Cache nimble
      uses: actions/cache@v4
      with:
        path: ~/.nimble
        key: ${{ runner.os }}-nimble-v2-${{ hashFiles('*.nimble') }}
        restore-keys: |
          ${{ runner.os }}-nimble-v2-

    - name: Setup Nim
      uses: jiro4989/setup-nim-action@v2
      with:
        nim-version: '2.2.x'
        repo-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Build Release
      run: nimble build -Y -d:release

    - name: Rename binary
      run: Rename-Item -Path gyatso_gui.exe -NewName gyatso_gui-windows-x86_64.exe

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      with:
        files: gyatso_gui-windows-x86_64.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
